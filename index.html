<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
  
</div>

<header class="topbar">
    <div class="menu">☰</div>

    <h1>NETFLIX</h1>
    
      
    

</div>

    <div class="search">
    <button id="searchBtn">🔍</button>
    <input type="text" id="searchInput" placeholder="Пошук фільму...">
</div>
</header>

<section class="filters">

    <select id="genreFilter">
        <option>Усі жанри</option>
        <option>Бойовик</option>
        <option>Комедія</option>
        <option>Драма</option>
        <option>Фантастика</option>
        <option>Жахи</option>
        <option>Романтична комедія</option>
        <option>Історичний</option>
        <option>Мультфільм</option>
        <option>Детектив</option>
    </select>

    <div class="row">

        <label class="switch">
            <input type="checkbox" id="uaFilter">
            <span class="slider"></span>
        </label>

        <span class="ua">Українська озвучка</span>

        <select id="sortFilter">
          <option value="default">По порядку</option>
          <option value="rating">За рейтингом</option>
          <option value="popularity">За популярністю</option>
        </select>

    </div>

</section>

<main class="movies" id="movies"></main>



<script src="script.js"></script>

</body>
</html>
